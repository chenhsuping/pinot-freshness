<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>手機版預覽 · 資料觀測儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:#D8DCE3;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:32px 16px;
    font-family:'Space Grotesk','Helvetica Neue',sans-serif;
    min-height:100vh;
  }
  .cap{ font:600 14px sans-serif; color:#4A525C; letter-spacing:.2px; }
  .phone{
    position:relative;
    width:390px; height:844px;
    background:#10131A;
    border-radius:54px;
    padding:13px;
    box-shadow:0 30px 70px rgba(20,30,45,.34), inset 0 0 0 2px #2A2F3A;
  }
  .notch{
    position:absolute; top:13px; left:50%; transform:translateX(-50%);
    width:150px; height:30px; background:#10131A; border-radius:0 0 18px 18px; z-index:3;
  }
  .screen{
    position:relative; width:100%; height:100%;
    background:#EDF0F5; border-radius:42px; overflow:hidden;
  }
  iframe{ width:100%; height:100%; border:0; display:block; background:#EDF0F5; }
</style>
</head>
<body>
  <div class="cap">手機版預覽 · iPhone 390 × 844（可直接點擊操作）</div>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <iframe src="index.html" title="Dashboard"></iframe>
    </div>
  </div>
</body>
</html>
